name: arxivinder
description: "Scientific Paper Recommender System"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  http: ^1.6.0
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - './assets/images/arxiv_register_logo.png'
    - .env

  fonts:
    - family: Poppins
      fonts:
      - asset: ./assets/font/Poppins.ttf
